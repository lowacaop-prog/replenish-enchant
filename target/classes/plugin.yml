name: ReplenishEnchant
version: 1.0.0
main: dev.replenish.enchant.ReplenishPlugin
api-version: 1.20
author: ReplenishDev
description: Hypixel-style Replenish enchantment that auto-replants crops
commands:
  replenish:
    description: Give yourself a Replenish enchanted book
    usage: /replenish
    permission: replenish.give
permissions:
  replenish.give:
    description: Allows getting the Replenish book via command
    default: op
  replenish.use:
    description: Allows using the Replenish enchantment
    default: true
